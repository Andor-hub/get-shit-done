name: HabitX
options:
  bundleIdPrefix: com.habitx
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.3"
  defaultConfig: Debug
  fileTypes:
    xcprivacy:
      buildPhase: resources
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
targets:
  HabitX:
    type: application
    platform: iOS
    sources:
      - path: HabitX/HabitX
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.habitx.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_ENTITLEMENTS: HabitX/HabitX/HabitX.entitlements
    info:
      path: HabitX/HabitX/Info.plist
      properties:
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIApplicationSupportsIndirectInputEvents: true
        UILaunchScreen: {}
        UISupportedInterfaceOrientations~iphone:
          - UIInterfaceOrientationPortrait
        CFBundleURLTypes:
          - CFBundleURLName: com.habitx.app
            CFBundleURLSchemes:
              - habitx
    entitlements:
      path: HabitX/HabitX/HabitX.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.habitx.shared
    dependencies:
      - target: HabitXWidget
        embed: true
  HabitXWidget:
    type: app-extension
    platform: iOS
    product: HabitXWidget
    sources:
      - path: HabitX/HabitXWidget
      - path: HabitX/HabitX/Models
      - path: HabitX/HabitX/Utilities
      - path: HabitX/HabitX/Services
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.habitx.app.widget
        CODE_SIGN_ENTITLEMENTS: HabitX/HabitXWidget/HabitXWidgetEntitlements.entitlements
    info:
      path: HabitX/HabitXWidget/Info.plist
      properties:
        CFBundleDisplayName: HabitXWidget
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: HabitX/HabitXWidget/HabitXWidgetEntitlements.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.habitx.shared
  HabitXTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: HabitX/HabitXTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.habitx.app.tests
        GENERATE_INFOPLIST_FILE: true
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
    entitlements:
      path: HabitX/HabitXTests/HabitXTests.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.habitx.shared
    dependencies:
      - target: HabitX
